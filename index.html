<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Mock Test | Strict Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Extra security: prevent text selection */
        body { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" oncontextmenu="return false;">

    <nav class="bg-blue-700 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold">KCET Practice Portal</h1>
        <div id="timer" class="text-lg font-mono bg-blue-900 px-4 py-1 rounded">Time Left: 10:00</div>
    </nav>

    <div class="max-auto max-w-5xl p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 bg-white p-8 rounded-lg shadow-md">
            <div id="question-content">
                <span id="q-number" class="text-blue-600 font-bold text-sm uppercase">Question 1</span>
                <p id="q-text" class="text-xl mt-2 mb-6 font-medium text-gray-800">Loading question...</p>
                
                <div id="options" class="space-y-3">
                    </div>
            </div>

            <div class="flex justify-between mt-10 pt-6 border-t">
                <button onclick="prevQuestion()" class="px-6 py-2 bg-gray-200 rounded hover:bg-gray-300 transition">Previous</button>
                <button onclick="nextQuestion()" id="next-btn" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Next</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md h-fit">
            <h3 class="font-bold mb-4 border-b pb-2 text-gray-700">Question Palette</h3>
            <div id="palette" class="grid grid-cols-5 gap-2">
                </div>
            <button onclick="submitTest()" class="w-full mt-8 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">Submit Test</button>
            <p id="warn-count" class="mt-4 text-xs text-red-500 font-medium"></p>
        </div>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const questions = [
            { q: "What is the SI unit of electric current?", options: ["Volt", "Ampere", "Ohm", "Watt"], correct: "Ampere" },
            { q: "The process of losing electrons is called?", options: ["Reduction", "Oxidation", "Ionization", "Diffusion"], correct: "Oxidation" },
            { q: "Which of the following is a scalar quantity?", options: ["Velocity", "Force", "Speed", "Acceleration"], correct: "Speed" }
        ];

        let currentIdx = 0;
        let answers = new Array(questions.length).fill(null);
        let timeLeft = 600; // 10 minutes in seconds
        let cheats = 0;

        // --- CORE FUNCTIONS ---
        function loadQuestion(index) {
            currentIdx = index;
            const q = questions[index];
            document.getElementById("q-number").innerText = `Question ${index + 1}`;
            document.getElementById("q-text").innerText = q.q;
            
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            
            q.options.forEach(opt => {
                const isChecked = answers[index] === opt ? 'checked' : '';
                optionsDiv.innerHTML += `
                    <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="answer" value="${opt}" ${isChecked} onchange="saveAnswer('${opt}')" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-gray-700">${opt}</span>
                    </label>
                `;
            });
            updatePalette();
        }

        function saveAnswer(val) {
            answers[currentIdx] = val;
            updatePalette();
        }

        function updatePalette() {
            const palette = document.getElementById("palette");
            palette.innerHTML = "";
            questions.forEach((_, i) => {
                const bgColor = answers[i] ? 'bg-green-500 text-white' : (i === currentIdx ? 'bg-blue-600 text-white' : 'bg-gray-200');
                palette.innerHTML += `<button onclick="loadQuestion(${i})" class="w-10 h-10 rounded ${bgColor} transition font-bold text-sm">${i + 1}</button>`;
            });
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) loadQuestion(currentIdx + 1);
        }

        function prevQuestion() {
            if (currentIdx > 0) loadQuestion(currentIdx - 1);
        }

        // --- TIMER ---
        setInterval(() => {
            if (timeLeft <= 0) submitTest();
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById("timer").innerText = `Time Left: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        }, 1000);

        // --- STRICT MODE LOGIC ---
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                cheats++;
                document.getElementById("warn-count").innerText = `Tab switches detected: ${cheats}`;
                alert("STRICT MODE: Do not switch tabs or windows!");
            }
        });

        function submitTest() {
            let score = 0;
            questions.forEach((q, i) => {
                if (answers[i] === q.correct) score++;
            });
            alert(`Test Finished!\nScore: ${score}/${questions.length}\nCheats: ${cheats}`);
            window.location.reload(); // Reset for now
        }

        // Initialize
        loadQuestion(0);
    </script>
</body>
</html>
