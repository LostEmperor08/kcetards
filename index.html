<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCETards! — Exam Portal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1f2434;
  --border: #2a3045;
  --border2: #3a4560;
  --text: #e8eaf2;
  --muted: #7a83a0;
  --accent: #4f7ef8;
  --accent2: #6c63ff;
  --green: #22c97a;
  --red: #f05a5a;
  --orange: #f5a623;
  --yellow: #f5d020;
  --visited: #9b59b6;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
button{font-family:var(--sans);cursor:pointer}
input,select{font-family:var(--sans)}

/* SCREENS */
.screen{display:none;height:100vh;overflow:hidden}
.screen.active{display:flex;flex-direction:column}

/* ADMIN SCREEN */
#s-admin{background:var(--bg);overflow-y:auto;height:auto;min-height:100vh}
.admin-wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
.logo{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text);margin-bottom:2.5rem}
.logo span{color:var(--accent)}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
input,select,textarea{
  width:100%;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-green{background:var(--green);color:#0a1a0f}
.btn-danger{background:transparent;border:1px solid #f05a5a44;color:var(--red)}

/* EXAM UI */
.exam-topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px}
.exam-timer{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);min-width:80px;text-align:right}
.exam-main{margin-top:94px;margin-right:260px;height:calc(100vh - 94px);overflow-y:auto;padding:1.5rem 6rem}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--surface)}
.option:hover{border-color:var(--border2);background:var(--surface2)}
.option.chosen{border-color:var(--accent);background:#4f7ef815}
.exam-nav{position:fixed;top:52px;right:0;width:260px;height:calc(100vh - 52px);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
.nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
.nav-btn.answered{background:var(--green);border-color:var(--green);color:#fff}

/* LOGIN UI */
#s-login{background:var(--bg);justify-content:center;align-items:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;width:100%;max-width:400px}
</style>
</head>
<body>

<div id="s-admin" class="screen">
<div class="admin-wrap">
  <div class="logo">KCETards!<span>Edge</span> <span style="font-size:13px;color:var(--muted);font-weight:400">— Admin Portal</span></div>

  <div class="section-title">1. Schedule Exam Window</div>
  <div class="card">
    <div class="form-row">
      <div><label>Start Date & Time</label><input type="datetime-local" id="a-start-time"></div>
      <div><label>End Date & Time</label><input type="datetime-local" id="a-end-time"></div>
    </div>
    <div class="form-row-3">
      <div><label>Duration (Minutes)</label><input type="number" id="a-duration" value="80"></div>
      <div><label>Mark per Correct</label><input type="number" id="a-marks" value="1"></div>
      <div><label>Mark per Wrong</label><input type="number" id="a-neg" value="0"></div>
    </div>
    <div style="margin-top:10px">
        <label>Admin Password</label><input type="password" id="a-pwd" value="admin123">
    </div>
  </div>

  <div class="section-title">2. Bulk Question Import (JSON)</div>
  <div class="card" style="border: 1px solid var(--accent2)">
    <input type="file" id="q-file" accept=".json" onchange="importQuestions(this)">
    <p style="font-size:11px;color:var(--muted);margin-top:8px">Upload a JSON file containing your KCET questions.</p>
  </div>

  <div class="section-title">3. Student IDs (CSV Style)</div>
  <div class="card">
    <textarea id="s-list" rows="5" placeholder="Name, RollNumber (e.g. Samarth, KCET2026_01)"></textarea>
    <button class="btn btn-outline" style="margin-top:10px" onclick="importStudents()">Import Students</button>
    <div id="status-students" style="font-size:12px;color:var(--green);margin-top:10px"></div>
  </div>

  <button class="btn btn-green" style="width:100%;padding:15px;font-weight:600" onclick="saveAndGoToLogin()">Save & Activate Exam</button>
</div>
</div>

<div id="s-login" class="screen active">
  <div class="login-box">
    <div class="logo">KCETards!<span>Edge</span></div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px" id="exam-title-display">Secure Exam Portal</div>
    <div style="margin-bottom:15px"><label>Roll Number</label><input type="text" id="l-roll"></div>
    <div style="margin-bottom:20px"><label>Password (Roll Number)</label><input type="password" id="l-pass"></div>
    <button class="btn btn-primary" style="width:100%;padding:12px" onclick="doLogin()">Enter Exam →</button>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-top:10px"></div>
    <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--muted);cursor:pointer" onclick="showScreen('s-admin')">Admin Login</div>
  </div>
</div>

<div id="s-exam" class="screen">
  <div class="exam-topbar">
    <div class="logo">KCETards!<span>Edge</span></div>
    <div id="user-display" style="flex:1;font-size:12px;color:var(--muted)"></div>
    <div class="exam-timer" id="timer">00:00:00</div>
    <button class="btn btn-danger" style="padding:5px 15px" onclick="confirmSubmit()">Submit</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="exam-main" id="q-container"></div>
    <div class="exam-nav" id="nav-container" style="padding:20px"></div>
  </div>
</div>

<div id="s-results" class="screen">
    <div class="admin-wrap" style="text-align:center">
        <h1 style="color:var(--green)">Exam Submitted</h1>
        <div class="card" style="margin-top:30px;padding:40px">
            <div style="font-size:14px;color:var(--muted)">Your Score</div>
            <div id="final-score" style="font-size:64px;font-weight:600;margin:10px 0">0</div>
            <div id="res-name" style="font-weight:600"></div>
        </div>
        <button class="btn btn-outline" onclick="location.reload()">Return Home</button>
    </div>
</div>

<script>
let config = { start: null, end: null, marks: 1, neg: 0, duration: 80, students: [], questions: [] };
let currentUser = null;
let userAnswers = [];
let timeLeft = 0;
let timerInterval = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 1. Bulk Question Import
function importQuestions(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      config.questions = JSON.parse(e.target.result);
      alert("Success: " + config.questions.length + " questions loaded.");
    } catch(err) { alert("Invalid JSON format."); }
  };
  reader.readAsText(file);
}

// 2. Manual Student Import
function importStudents() {
  const raw = document.getElementById('s-list').value;
  const lines = raw.split('\n');
  config.students = [];
  lines.forEach(l => {
    const parts = l.split(',').map(i => i.trim());
    if(parts.length >= 2) config.students.push({ name: parts[0], roll: parts[1] });
  });
  document.getElementById('status-students').innerText = config.students.length + " students imported.";
}

function saveAndGoToLogin() {
  config.start = document.getElementById('a-start-time').value;
  config.end = document.getElementById('a-end-time').value;
  config.duration = parseInt(document.getElementById('a-duration').value);
  config.marks = parseFloat(document.getElementById('a-marks').value);
  config.neg = parseFloat(document.getElementById('a-neg').value);
  showScreen('s-login');
}

// 3. Scheduled Login Logic
function doLogin() {
  const roll = document.getElementById('l-roll').value;
  const pass = document.getElementById('l-pass').value;
  const now = new Date();

  if(config.start && now < new Date(config.start)) return alert("Exam window opens at " + new Date(config.start).toLocaleString());
  if(config.end && now > new Date(config.end)) return alert("Exam window closed.");

  const student = config.students.find(s => s.roll === roll && roll === pass);
  if(!student) return document.getElementById('login-err').innerText = "Incorrect Roll Number or Password.";

  currentUser = student;
  startExam();
}

function startExam() {
  if(config.questions.length === 0) return alert("No questions found in system.");
  userAnswers = new Array(config.questions.length).fill(-1);
  timeLeft = config.duration * 60;
  document.getElementById('user-display').innerText = currentUser.name + " | " + currentUser.roll;
  showScreen('s-exam');
  renderQuestion(0);
  renderNav();
  
  timerInterval = setInterval(() => {
    timeLeft--;
    const h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
    document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(timeLeft <= 0) confirmSubmit();
  }, 1000);
}

function renderQuestion(idx) {
  const q = config.questions[idx];
  let html = `<div style="margin-bottom:20px;font-size:11px;color:var(--muted)">QUESTION ${idx+1} OF ${config.questions.length}</div>`;
  html += `<div style="font-size:18px;margin-bottom:30px">${q.text}</div>`;
  q.options.forEach((opt, i) => {
    html += `<div class="option ${userAnswers[idx] === i ? 'chosen' : ''}" onclick="saveAns(${idx}, ${i})">${opt}</div>`;
  });
  document.getElementById('q-container').innerHTML = html;
}

function saveAns(qIdx, optIdx) {
  userAnswers[qIdx] = optIdx;
  renderQuestion(qIdx);
  renderNav();
}

function renderNav() {
  let html = `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">`;
  userAnswers.forEach((ans, i) => {
    html += `<button class="nav-btn ${ans !== -1 ? 'answered' : ''}" onclick="renderQuestion(${i})">${i+1}</button>`;
  });
  html += `</div>`;
  document.getElementById('nav-container').innerHTML = html;
}

function confirmSubmit() {
  clearInterval(timerInterval);
  let score = 0;
  config.questions.forEach((q, i) => {
    if(userAnswers[i] === q.correct) score += config.marks;
    else if(userAnswers[i] !== -1) score -= config.neg;
  });
  document.getElementById('final-score').innerText = score;
  document.getElementById('res-name').innerText = currentUser.name;
  showScreen('s-results');
}
</script>
</body>
</html>
